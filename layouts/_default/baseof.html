<!DOCTYPE html>
<html lang="{{ .Site.Language }}">
{{ partial "head.html" . }}

<body id="body">
{{- partial "header.html" . }}
{{- block "main" . -}}{{ end }}
{{- partial "footer.html" . }}
{{ $scripts := resources.Get "scripts/main.ts" }}
{{ $options := dict "minify" true }}
{{ $js := $scripts | js.Build $options }}
<script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" defer></script>
</body>
</html>
