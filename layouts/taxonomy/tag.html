{{ define "main" }}
<main class="container py-12 mx-auto max-w-screen-xl px-4 sm:px-6 lg:px-8 shadow-sm">
    <div class="prose prose-neutral lg:prose-lg">
        <header>
            <span class="text-lg text-gray-500/75">Tag</span>
            <h1 class="tag tag-lg tag-{{ anchorize .Title }}">{{.Title}}</h1>
        </header>
    </div>
</main>
<section class="container py-12 mx-auto max-w-screen-xl px-4 sm:px-6 lg:px-8">
    {{ $taggedPages := (index .Site.Taxonomies.tags (anchorize .Title)).Pages }}
    {{ range $taggedPages }}
    <li hugo-nav="{{ .RelPermalink}}"><a href="{{ .Permalink}}">{{ .LinkTitle }}</a></li>
    {{ end }}
</section>
{{ end }}
